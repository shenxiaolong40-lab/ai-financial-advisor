<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>财务自由顾问</title>
  <meta name="theme-color" content="#10B981">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="自由顾问">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('/sw.js').catch(() => {}));
    }
  </script>
</head>
<body>
<div id="app">

  <!-- ══════════════ PAGE: FIRE 仪表盘 ══════════════ -->
  <div id="page-fire" class="page">
    <div class="page-header">
      <h1>🔥 财务自由之路</h1>
      <button id="btn-fire-config" class="btn-icon-text">⚙️ 配置</button>
    </div>

    <!-- 核心英雄区 -->
    <div class="fire-hero">
      <div class="fire-years-label">距离财务自由</div>
      <div class="fire-years" id="fire-years">—</div>
      <div class="fire-years-unit">年</div>
      <div class="fire-subtitle" id="fire-subtitle">请先配置收入和资产信息</div>
    </div>

    <!-- 进度条 -->
    <div class="fire-progress-wrap">
      <div class="fire-progress-track">
        <div class="fire-progress-fill" id="fire-progress-bar" style="width:0%"></div>
      </div>
      <div class="fire-progress-label" id="fire-progress-label">¥0 / ¥0（0%）</div>
    </div>

    <!-- 月度收支摘要 -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">固定月收入</div>
        <div class="stat-value income" id="stat-fixed-income">—</div>
        <div class="stat-sublabel" id="stat-invest-income">理财 —</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">月均支出 <span class="hint">近3月</span></div>
        <div class="stat-value expense" id="stat-expense">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">月储蓄</div>
        <div class="stat-value" id="stat-savings">—</div>
      </div>
      <div class="stat-card highlight">
        <div class="stat-label">储蓄率</div>
        <div class="stat-value" id="stat-rate">—</div>
      </div>
    </div>

    <!-- 预测曲线 -->
    <div class="card">
      <div class="card-title">资产增长预测</div>
      <div class="chart-wrap">
        <canvas id="chart-projection"></canvas>
      </div>
    </div>

    <!-- 双图：支出分类 + 资产配置 -->
    <div class="dual-chart-row">
      <div class="card half">
        <div class="card-title">支出分布</div>
        <div class="chart-wrap-sm">
          <canvas id="chart-expense-pie"></canvas>
        </div>
      </div>
      <div class="card half">
        <div class="card-title">资产配置</div>
        <div class="chart-wrap-sm" id="asset-pie-wrap">
          <canvas id="chart-asset-pie"></canvas>
        </div>
      </div>
    </div>

    <!-- AI 建议预览 -->
    <div class="card ai-hint-card" onclick="navigate('ai')">
      <div class="ai-hint-header">💡 AI 顾问建议</div>
      <div class="ai-hint-text" id="ai-hint-text">点击生成你的专属 FIRE 优化建议 →</div>
    </div>

    <div style="height:80px"></div>
  </div>

  <!-- ══════════════ PAGE: 收支记录 ══════════════ -->
  <div id="page-transactions" class="page">
    <div class="page-header">
      <h1>📋 收支记录</h1>
      <div class="month-nav">
        <button id="btn-prev-month" class="month-btn">‹</button>
        <span id="txn-month-label">2026-05</span>
        <button id="btn-next-month" class="month-btn">›</button>
      </div>
    </div>

    <!-- 月度统计 -->
    <div class="txn-stats-bar">
      <div class="txn-stat">
        <span class="txn-stat-label">收入</span>
        <span class="txn-stat-val income" id="txn-income-total">¥0</span>
      </div>
      <div class="txn-stat">
        <span class="txn-stat-label">支出</span>
        <span class="txn-stat-val expense" id="txn-expense-total">¥0</span>
      </div>
      <div class="txn-stat">
        <span class="txn-stat-label">结余</span>
        <span class="txn-stat-val" id="txn-balance">¥0</span>
      </div>
    </div>

    <!-- 筛选 -->
    <div class="txn-filter-row">
      <div class="filter-tabs">
        <button class="txn-type-filter active" data-filter="">全部</button>
        <button class="txn-type-filter" data-filter="expense">支出</button>
        <button class="txn-type-filter" data-filter="income">收入</button>
      </div>
      <input id="txn-search" class="search-input" type="text" placeholder="搜索商户/备注">
    </div>

    <!-- CSV 导入区 -->
    <div class="import-section">
      <div class="import-title">导入账单</div>
      <div class="import-row">
        <input type="file" id="import-file" accept=".csv" class="file-input">
      </div>
      <div class="import-btns">
        <button id="btn-import-alipay" class="btn btn-outline btn-sm">导入支付宝</button>
        <button id="btn-import-wechat" class="btn btn-outline btn-sm">导入微信</button>
        <a href="/api/import/sample/alipay" class="btn btn-ghost btn-sm" download>支付宝示例</a>
      </div>
      <div id="import-result" class="import-result"></div>
    </div>

    <!-- 交易列表 -->
    <div id="txn-list" class="txn-list"></div>

    <div style="height:80px"></div>

    <!-- FAB 添加按钮 -->
    <button id="btn-add-txn" class="fab">＋</button>
  </div>

  <!-- ══════════════ PAGE: AI 顾问 ══════════════ -->
  <div id="page-ai" class="page">
    <div class="page-header">
      <h1>🤖 AI 顾问</h1>
      <button id="btn-ai-clear" class="btn-icon-text">清空</button>
    </div>

    <!-- 一键生成报告 -->
    <button id="btn-ai-analysis" class="btn btn-primary btn-full">🔍 生成 FIRE 优化报告</button>

    <!-- 快捷提问 -->
    <div id="ai-quick-prompts" class="quick-prompts"></div>

    <!-- 对话区 -->
    <div id="ai-messages" class="ai-messages"></div>

    <!-- 输入区 -->
    <div class="ai-input-bar">
      <textarea id="ai-input" class="ai-textarea" placeholder="问问你的财务自由顾问…" rows="1"></textarea>
      <button id="btn-ai-send" class="btn btn-primary btn-send">发送</button>
    </div>
  </div>

</div><!-- #app -->

<!-- ══════════════ 底部导航 ══════════════ -->
<nav class="bottom-nav">
  <button class="nav-item active" data-page="fire">
    <span class="nav-icon">🔥</span>
    <span class="nav-label">自由之路</span>
  </button>
  <button class="nav-item" data-page="transactions">
    <span class="nav-icon">📋</span>
    <span class="nav-label">收支记录</span>
  </button>
  <button class="nav-item" data-page="ai">
    <span class="nav-icon">🤖</span>
    <span class="nav-label">AI 顾问</span>
  </button>
</nav>

<!-- ══════════════ MODAL: FIRE 配置 ══════════════ -->
<div id="modal-fire-config" class="modal-overlay" style="display:none">
  <div class="modal">
    <div class="modal-header">
      <h3>FIRE 配置</h3>
      <button data-close class="btn-close">×</button>
    </div>
    <div class="modal-body">
      <div class="form-section-title">收支设置</div>
      <div class="form-group">
        <label>固定月收入（元）<span class="cfg-hint">工资/副业等</span></label>
        <input id="cfg-income" type="number" placeholder="20000" min="0">
      </div>
      <div class="form-group">
        <label>月均支出（元）<span class="cfg-hint">0 = 自动从账单计算</span></label>
        <input id="cfg-expense" type="number" placeholder="10000" min="0">
      </div>

      <div class="form-section-title">资产 &amp; 各类收益率</div>
      <div class="cfg-asset-hint">每类资产单独设置预期年化收益率</div>

      <div class="cfg-asset-block">
        <div class="cfg-asset-label">💵 现金 / 货基</div>
        <div class="cfg-asset-row">
          <div class="form-group">
            <label>金额（元）</label>
            <input id="cfg-cash" type="number" placeholder="0" min="0">
          </div>
          <div class="form-group">
            <label>年化收益率（%）</label>
            <input id="cfg-cash-return" type="number" placeholder="2" min="0" max="30" step="0.1">
          </div>
        </div>
      </div>

      <div class="cfg-asset-block">
        <div class="cfg-asset-label">📈 股票 / 基金</div>
        <div class="cfg-asset-row">
          <div class="form-group">
            <label>金额（元）</label>
            <input id="cfg-stock" type="number" placeholder="0" min="0">
          </div>
          <div class="form-group">
            <label>年化收益率（%）</label>
            <input id="cfg-stock-return" type="number" placeholder="8" min="0" max="50" step="0.1">
          </div>
        </div>
      </div>

      <div class="cfg-asset-block">
        <div class="cfg-asset-label">🏠 房产</div>
        <div class="cfg-asset-row">
          <div class="form-group">
            <label>市值（元）</label>
            <input id="cfg-realestate" type="number" placeholder="0" min="0">
          </div>
          <div class="form-group">
            <label>年化收益率（%）</label>
            <input id="cfg-realestate-return" type="number" placeholder="4" min="0" max="30" step="0.1">
          </div>
        </div>
      </div>

      <div class="cfg-asset-block">
        <div class="cfg-asset-label">💎 债券 / 其他</div>
        <div class="cfg-asset-row">
          <div class="form-group">
            <label>金额（元）</label>
            <input id="cfg-other" type="number" placeholder="0" min="0">
          </div>
          <div class="form-group">
            <label>年化收益率（%）</label>
            <input id="cfg-other-return" type="number" placeholder="4" min="0" max="30" step="0.1">
          </div>
        </div>
      </div>

      <div class="form-section-title">FIRE 参数</div>
      <div class="form-group">
        <label>FIRE 倍数（默认25，即4%法则）</label>
        <input id="cfg-multiplier" type="number" placeholder="25" min="10" max="50">
      </div>
    </div>
    <div class="modal-footer">
      <button id="btn-save-config" class="btn btn-primary btn-full">保存</button>
    </div>
  </div>
</div>

<!-- ══════════════ MODAL: 添加/编辑交易 ══════════════ -->
<div id="modal-txn" class="modal-overlay" style="display:none">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modal-txn-title">添加记录</h3>
      <button data-close class="btn-close">×</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="txn-id">
      <form id="txn-form">
        <div class="form-group">
          <label>类型</label>
          <select id="txn-type">
            <option value="expense">支出</option>
            <option value="income">收入</option>
          </select>
        </div>
        <div class="form-group">
          <label>金额（元）</label>
          <input id="txn-amount" type="number" placeholder="0.00" min="0.01" step="0.01" required>
        </div>
        <div class="form-group">
          <label>日期</label>
          <input id="txn-date" type="date" required>
        </div>
        <div class="form-group">
          <label>分类</label>
          <select id="txn-category"></select>
        </div>
        <div class="form-group">
          <label>商户</label>
          <input id="txn-merchant" type="text" placeholder="如：麦当劳">
        </div>
        <div class="form-group">
          <label>备注</label>
          <input id="txn-description" type="text" placeholder="可选">
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button id="btn-save-txn" class="btn btn-primary btn-full">保存</button>
    </div>
  </div>
</div>

<!-- ══════════════ MODAL: 登录（多用户模式）══════════════ -->
<div id="modal-login" class="modal-overlay" style="display:none">
  <div class="modal">
    <div class="modal-header">
      <h3>账户登录</h3>
      <button data-close class="btn-close">×</button>
    </div>
    <div class="modal-body">
      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="login">登录</button>
        <button class="auth-tab" data-tab="register">注册</button>
      </div>
      <div id="form-login" class="auth-form active">
        <div class="form-group"><label>邮箱</label><input id="login-email" type="email" placeholder="you@example.com"></div>
        <div class="form-group"><label>密码</label><input id="login-pw" type="password" placeholder="••••••••"></div>
        <button id="btn-login" class="btn btn-primary btn-full">登录</button>
      </div>
      <div id="form-register" class="auth-form">
        <div class="form-group"><label>邮箱</label><input id="reg-email" type="email" placeholder="you@example.com"></div>
        <div class="form-group"><label>密码</label><input id="reg-pw" type="password" placeholder="••••••••"></div>
        <button id="btn-register" class="btn btn-primary btn-full">注册</button>
      </div>
    </div>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/app.js"></script>
<script src="js/fire.js"></script>
<script src="js/transactions.js"></script>
<script src="js/ai.js"></script>
</body>
</html>
